<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Services | Synexis IT Solutions</title>

  <style>
    :root{
      --bg-1:#020617;
      --bg-2:#0f172a;
      --surface:rgba(15,23,42,.78);
      --line:rgba(148,163,184,.16);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --primary:#14b8a6;
      --primary-2:#22c55e;
      --accent:#facc15;
      --shadow:0 18px 34px rgba(0,0,0,.22);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(2,6,23,.74),rgba(2,6,23,.9)),
        url("images/networking.jpg") center/cover no-repeat fixed;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      padding:20px 40px;
      background:rgba(2,6,23,.74);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,.05);
      position:sticky;
      top:0;
      z-index:50;
      flex-wrap:wrap;
    }

    .brand-wrap{display:flex;align-items:center;gap:14px}

    .logo-mark{
      width:54px;
      height:54px;
      border-radius:16px;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      display:grid;
      place-items:center;
      font-weight:bold;
      color:white;
    }

    .brand h1{margin:0;font-size:1.5rem}
    .brand p{margin:5px 0 0;color:#7dd3fc;font-size:.95rem}

    nav{display:flex;align-items:center;gap:6px;flex-wrap:wrap}

    nav a{
      color:var(--text);
      text-decoration:none;
      font-weight:500;
      padding:10px 14px;
      border-radius:999px;
      transition:.25s ease;
    }

    nav a:hover{
      color:#99f6e4;
      background:rgba(255,255,255,.05);
    }

    nav a.active{
      color:#fff;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
    }

    .container{
      max-width:1200px;
      margin:auto;
      padding:70px 20px;
    }

    .section-title{
      text-align:center;
      font-size:2.3rem;
      margin:0 0 10px;
      color:#99f6e4;
    }

    .section-subtitle{
      text-align:center;
      color:var(--muted);
      max-width:760px;
      margin:0 auto 40px;
      line-height:1.8;
    }

    .services-grid{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:24px;
    }

    .card-link{
      text-decoration:none;
      color:inherit;
      grid-column:span 2;
    }

    .card-link:nth-child(4){
      grid-column:2 / span 2;
    }

    .card-link:nth-child(5){
      grid-column:4 / span 2;
    }

    .card{
      height:100%;
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:24px;
      padding:26px;
      box-shadow:var(--shadow);
      transition:.25s ease;
    }

    .card:hover{
      transform:translateY(-6px);
      border-color:rgba(34,197,94,.35);
    }

    .icon{
      width:54px;
      height:54px;
      border-radius:16px;
      display:grid;
      place-items:center;
      margin-bottom:16px;
      background:rgba(20,184,166,.12);
      font-size:1.4rem;
    }

    .card h3{
      margin:0 0 12px;
      color:#f8fafc;
    }

    .card p{
      color:var(--muted);
      line-height:1.7;
      margin:0 0 18px;
    }

      color:#99f6e4;
      font-weight:bold;
